version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: robotics_learning_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: robotics_learning
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build: .
    container_name: robotics_learning_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USERNAME: app_user
      DB_PASSWORD: app_password
      DB_DATABASE: robotics_learning
      JWT_SECRET: ${JWT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      CF_ACCOUNT_ID: ${CF_ACCOUNT_ID}
      CF_TOKEN: ${CF_TOKEN}
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mysql_data:
